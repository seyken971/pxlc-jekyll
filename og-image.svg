<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img">
  <title>pxlc — Le numérique, on vous l'explique.</title>
  <desc>Bannière OpenGraph pxlc : logo grille triangle blason à gauche, accroche à droite, fond sombre violet.</desc>

  <!-- Fond principal -->
  <rect width="1200" height="630" fill="#0e0c1e"/>

  <!-- Bande latérale gauche subtile -->
  <rect x="0" y="0" width="6" height="630" fill="#1E88E5"/>
  <rect x="6" y="0" width="4" height="630" fill="#7B1FA2"/>
  <rect x="10" y="0" width="4" height="630" fill="#C62828"/>

  <!-- Halo central droit (derrière le texte) -->
  <ellipse cx="850" cy="315" rx="320" ry="220" fill="#3C3489" opacity="0.18"/>

  <!-- ── Grille 3×3 — Variante C, côté gauche ──
       Pixel : 80px  Gap : 12px
       Bloc : 3×80 + 2×12 = 264px
       Centre x grille : 200  →  offset x = 200 - 132 = 68
       Centre y : 315         →  offset y = 315 - 132 = 183
  -->

  <!-- Ligne 1 -->
  <rect x="68"  y="183" width="80" height="80" rx="12" fill="#1E88E5"/>
  <rect x="160" y="183" width="80" height="80" rx="12" fill="#1565C0"/>
  <rect x="252" y="183" width="80" height="80" rx="12" fill="#1976D2"/>

  <!-- Ligne 2 -->
  <rect x="68"  y="275" width="80" height="80" rx="12" fill="#5C6BC0"/>
  <rect x="160" y="275" width="80" height="80" rx="12" fill="#7B1FA2"/>
  <rect x="252" y="275" width="80" height="80" rx="12" fill="#E53935"/>

  <!-- Ligne 3 -->
  <rect x="68"  y="367" width="80" height="80" rx="12" fill="#6A1B9A"/>
  <rect x="160" y="367" width="80" height="80" rx="12" fill="#AD1457"/>
  <rect x="252" y="367" width="80" height="80" rx="12" fill="#C62828"/>

  <!-- Séparateur vertical -->
  <line x1="390" y1="80" x2="390" y2="550" stroke="#534AB7" stroke-width="1" opacity="0.4"/>

  <!-- ── Texte côté droit ── -->

  <!-- Nom -->
  <text
    x="460"
    y="290"
    font-family="'Space Mono', 'Courier New', monospace"
    font-size="148"
    font-weight="700"
    fill="#EEEDFE"
    letter-spacing="-4"
  >pxlc</text>

  <!-- Ligne de séparation sous le nom -->
  <rect x="460" y="308" width="580" height="2" fill="#534AB7" opacity="0.6"/>

  <!-- Accroche -->
  <text
    x="460"
    y="366"
    font-family="'Space Mono', 'Courier New', monospace"
    font-size="28"
    font-weight="400"
    fill="#CECBF6"
    font-style="italic"
    letter-spacing="1"
  >Le numérique, on vous l'explique.</text>

  <!-- Localisation -->
  <text
    x="460"
    y="430"
    font-family="'Space Mono', 'Courier New', monospace"
    font-size="18"
    fill="#8880A8"
    letter-spacing="3"
  >GUADELOUPE · CARAÏBES</text>

  <!-- Petits pixels décoratifs coin bas-droit -->
  <rect x="1090" y="520" width="18" height="18" rx="3" fill="#1E88E5" opacity="0.5"/>
  <rect x="1112" y="520" width="18" height="18" rx="3" fill="#7B1FA2" opacity="0.5"/>
  <rect x="1134" y="520" width="18" height="18" rx="3" fill="#C62828" opacity="0.5"/>
  <rect x="1090" y="542" width="18" height="18" rx="3" fill="#5C6BC0" opacity="0.5"/>
  <rect x="1112" y="542" width="18" height="18" rx="3" fill="#AD1457" opacity="0.5"/>
  <rect x="1134" y="542" width="18" height="18" rx="3" fill="#6A1B9A" opacity="0.5"/>

  <!-- URL discrète -->
  <text
    x="600"
    y="590"
    font-family="'Space Mono', 'Courier New', monospace"
    font-size="16"
    fill="#3C3489"
    text-anchor="middle"
    letter-spacing="2"
  >pxlc.fr</text>

</svg>
