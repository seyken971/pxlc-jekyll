<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="pxlcLogoTitle pxlcLogoDesc" focusable="false">
  <title id="pxlcLogoTitle">Logo PXLC</title>
  <desc id="pxlcLogoDesc">Icône PXLC en grille de neuf pixels arrondis rouges, blancs et bleus sur fond sombre, pour une entreprise de médiation numérique en Guadeloupe.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#080812"/>
    </linearGradient>

    <radialGradient id="glow-red" cx="30%" cy="30%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FF2020" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF2020" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-blue" cx="70%" cy="70%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1A6FFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1A6FFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="px-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1000" height="1000" rx="180" fill="url(#bg)"/>
  <rect width="1000" height="1000" rx="180" fill="url(#glow-red)"/>
  <rect width="1000" height="1000" rx="180" fill="url(#glow-blue)"/>

  <rect x="107" y="107" width="220" height="220" rx="36" fill="#E8001C" filter="url(#px-shadow)"/>
  <rect x="107" y="107" width="220" height="105" rx="36" fill="white" opacity="0.08"/>

  <rect x="372" y="107" width="220" height="220" rx="36" fill="#8B0010" filter="url(#px-shadow)"/>
  <rect x="372" y="107" width="220" height="105" rx="36" fill="white" opacity="0.05"/>

  <rect x="637" y="107" width="220" height="220" rx="36" fill="#3A3A5C" filter="url(#px-shadow)"/>

  <rect x="107" y="372" width="220" height="220" rx="36" fill="#6E0012" filter="url(#px-shadow)"/>

  <rect x="372" y="372" width="220" height="220" rx="36" fill="#FFFFFF" filter="url(#px-shadow)"/>
  <rect x="372" y="372" width="220" height="220" rx="36" fill="#F0EEFF" opacity="0.6"/>

  <rect x="637" y="372" width="220" height="220" rx="36" fill="#003DBF" filter="url(#px-shadow)"/>

  <rect x="107" y="637" width="220" height="220" rx="36" fill="#3A3A5C" filter="url(#px-shadow)"/>

  <rect x="372" y="637" width="220" height="220" rx="36" fill="#0050E0" filter="url(#px-shadow)"/>
  <rect x="372" y="637" width="220" height="105" rx="36" fill="white" opacity="0.05"/>

  <rect x="637" y="637" width="220" height="220" rx="36" fill="#1A6FFF" filter="url(#px-shadow)"/>
  <rect x="637" y="637" width="220" height="105" rx="36" fill="white" opacity="0.08"/>
</svg>
