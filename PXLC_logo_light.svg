<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&amp;family=Instrument+Sans&amp;display=swap');
      .wm  { font-family: "Bricolage Grotesque", "Arial Black", sans-serif; font-weight: 700; }
      .tag { font-family: "Instrument Sans", Arial, sans-serif; font-weight: 400; }
    </style>
  </defs>

  <!-- Fond clair #EBF5F8 -->
  <rect width="640" height="640" fill="#EBF5F8"/>

  <!-- Grille de pixels — dégradé cyan → sombre -->
  <rect x="200" y="150" width="52" height="52" fill="#00D2C8"/>
  <rect x="263" y="150" width="52" height="52" fill="#01A09D"/>
  <rect x="326" y="150" width="52" height="52" fill="#036E73"/>
  <rect x="389" y="150" width="52" height="52" fill="#043C49"/>
  <rect x="200" y="213" width="52" height="52" fill="#00D2C8"/>
  <rect x="263" y="213" width="52" height="52" fill="#01A09D"/>
  <rect x="326" y="213" width="52" height="52" fill="#036E73"/>
  <rect x="389" y="213" width="52" height="52" fill="#043C49"/>
  <rect x="200" y="276" width="52" height="52" fill="#00D2C8"/>
  <rect x="263" y="276" width="52" height="52" fill="#01A09D"/>
  <rect x="326" y="276" width="52" height="52" fill="#036E73"/>
  <rect x="389" y="276" width="52" height="52" fill="#043C49"/>
  <rect x="200" y="339" width="52" height="52" fill="#00D2C8"/>
  <rect x="263" y="339" width="52" height="52" fill="#01A09D"/>
  <rect x="326" y="339" width="52" height="52" fill="#036E73"/>
  <!-- Pixel accent orange -->
  <rect x="389" y="339" width="52" height="52" fill="#FF781E"/>

  <!-- Wordmark — couleur sombre sur fond clair -->
  <text class="wm" x="320" y="438" font-size="88" fill="#061C2E" text-anchor="middle" dominant-baseline="hanging">PXLC</text>
  <text class="tag" x="320" y="546" font-size="22" fill="#036E73" opacity="0.85" text-anchor="middle">PIXELS CARAÏBES</text>
</svg>
