<header class="site-header" data-header>
  <a class="brand" href="{{ '/' | relative_url }}" aria-label="PXLC - Accueil">
    <img src="{{ '/logo-pxlc-square.svg' | relative_url }}" alt="" width="34" height="34">
    <span>pxlc</span>
  </a>

  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
    <span class="sr-only">Menu</span>
    <span></span>
    <span></span>
  </button>

  <nav class="site-nav" id="site-nav" data-nav>
    {% for item in site.data.navigation %}
      <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
    {% endfor %}
  </nav>
</header>
