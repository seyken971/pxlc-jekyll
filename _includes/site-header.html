<header class="site-header" data-header>
  <a class="brand" href="{{ '/' | relative_url }}" aria-label="Pixels Caraïbes - Accueil">
    <img src="{{ '/PXLC_logo_light.svg' | relative_url }}" alt="" width="44" height="44">
    <span>Pixels Caraïbes</span>
  </a>

  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" data-nav-toggle>
    <span class="sr-only">Menu</span>
    {% include icons.html name="menu" %}
  </button>

  <nav class="site-nav" id="site-nav" data-nav>
    {% for item in site.data.navigation %}
    <a href="{{ item.url | relative_url }}" {% if page.url==item.url %}aria-current="page" {% endif %}>{{ item.title
      }}</a>
    {% endfor %}
  </nav>
  <a class="header-cta" href="{{ '/contact/' | relative_url }}">Contact</a>
</header>
