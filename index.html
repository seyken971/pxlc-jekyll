<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══ Mobile / PWA ══════════════════════════════════════════════════ -->
    <meta name="theme-color" content="#0e0c1e" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- ═══ CSP de secours (le fichier _headers fait foi) ════════════════ -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src https://fonts.gstatic.com;
                 img-src 'self' data:;
                 script-src 'self' 'unsafe-inline'"
    />

    <!-- ═══ Polices (preconnect évite le flash de texte invisible FOIT) ═══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --blue-dark: #1565c0;
        --blue-mid: #1e88e5;
        --blue-light: #90caf9;
        --violet-dark: #4a148c;
        --violet-mid: #7b1fa2;
        --violet-light: #ce93d8;
        --violet-pale: #ede7f6;
        --red-dark: #b71c1c;
        --red-mid: #e53935;
        --red-light: #ef9a9a;
        --accent: #5c6bc0;
        --white-warm: #eeedfe;
        --bg: #0e0c1e;
        --bg2: #16132e;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: #fff;
        font-family: "Space Mono", monospace;
        /* FIX élevé : auto au lieu de hidden — contenu accessible sur petits écrans */
        overflow: auto;
      }

      /* Grille de pixels en arrière-plan */
      .grid-bg {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(18, 1fr);
        grid-template-rows: repeat(10, 1fr);
        gap: 6px;
        padding: 6px;
        opacity: 0.07;
        pointer-events: none;
        z-index: 0;
      }
      .grid-bg span {
        border-radius: 4px;
        animation: pulse var(--d, 4s) ease-in-out infinite var(--delay, 0s);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }

      /* Halo central — FIX élevé : taille responsive, ne couvre plus l'écran mobile */
      .halo {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(600px, 90vw);
        height: min(600px, 90vw);
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(123, 31, 162, 0.15) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      /* Contenu principal */
      main {
        position: relative;
        z-index: 1;
        min-height: 100vh; /* FIX : min-height, pas height fixe */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        padding: 2rem;
        text-align: center;
      }

      /* Logo SVG inline — FIX élevé : responsive */
      .logo {
        margin-bottom: 3rem;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.8s ease forwards 0.2s;
      }
      .logo svg {
        max-width: 100%;
        height: auto;
      }

      /* FIX moyen : h1 sémantique (était un <p>), style identique visuellement */
      h1.headline {
        font-size: clamp(1.1rem, 3vw, 1.6rem);
        font-weight: 400;
        font-style: italic;
        color: var(--white-warm);
        letter-spacing: 0.05em;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.8s ease forwards 0.5s;
        margin-bottom: 1rem;
      }

      /* Barre de progression */
      .progress-wrap {
        width: min(420px, 90vw);
        margin: 2rem 0 0.6rem;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.8s;
      }
      .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--blue-light);
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }
      .progress-bar {
        height: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--blue-mid),
          var(--violet-mid),
          var(--red-mid)
        );
        border-radius: 2px;
        animation: fillBar 2s cubic-bezier(0.4, 0, 0.2, 1) forwards 1.2s;
      }
      @keyframes fillBar {
        to {
          width: 73%;
        }
      }

      .contact {
        margin-top: 3rem;
        font-size: 12px;
        color: var(--blue-light);
        letter-spacing: 0.08em;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 1.1s;
        line-height: 2;
      }
      .contact a {
        color: var(--white-warm);
        text-decoration: none;
        border-bottom: 1px solid rgba(238, 237, 254, 0.3);
        transition: border-color 0.2s;
        /* taille tactile définie dans le bloc WCAG 2.5.8 ci-dessus */
      }
      .contact a:hover {
        border-color: var(--white-warm);
      }

      /* Ligne décorative */
      .divider {
        width: min(420px, 90vw);
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--blue-mid),
          var(--violet-mid),
          var(--red-mid),
          transparent
        );
        margin: 2rem 0;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 1s;
      }

      /* Curseur clignotant */
      .cursor {
        display: inline-block;
        width: 10px;
        height: 1.1em;
        background: var(--red-mid);
        vertical-align: middle;
        margin-left: 4px;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── WCAG 2.2 : focus visible (2.4.11 / 2.4.13) ──────────────────────
       :focus-visible cible uniquement la navigation clavier, pas les clics souris.
       Contour vert de la charte, 2px min, ratio de contraste > 3:1 ✓           */
      :focus-visible {
        outline: 2px solid var(--blue-light);
        outline-offset: 3px;
        border-radius: 3px;
      }

      /* ── WCAG 2.2 : taille cible tactile (2.5.8) ─────────────────────────
       Les liens de contact sont en 12px — trop petits pour un tap précis.
       On agrandit la zone cliquable avec padding sans changer le rendu visuel. */
      .contact a {
        display: inline-block;
        padding: 6px 4px;
        margin: -6px -4px;
      }

      /* ── WCAG 2.3.3 : respect de prefers-reduced-motion ──────────────────
       Les utilisateurs ayant activé "Réduire les animations" dans leur OS
       (épilepsie, vertiges, TDAH) n'auront plus d'animations continues.
       Bénéfice secondaire : réduit la charge GPU sur mobiles bas de gamme.    */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        /* Le contenu reste visible même sans l'animation fadeUp */
        .logo,
        h1.headline,
        .progress-wrap,
        .divider,
        .contact {
          opacity: 1;
          transform: none;
        }
      }

      /* Coin bas-droit — FIX WCAG : #8880A8 ratio 5.23 (AA) au lieu de rgba 0.15 */
      .corner {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        font-size: 10px;
        color: #8880a8;
        letter-spacing: 0.1em;
        z-index: 1;
      }

      /* FIX critique : lien mentions légales (obligation LCEN) */
      .legal-link {
        position: fixed;
        bottom: 1.5rem;
        left: 1.5rem;
        font-size: 10px;
        color: #8880a8;
        letter-spacing: 0.1em;
        text-decoration: none;
        z-index: 1;
        border-bottom: 1px solid transparent;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .legal-link:hover {
        color: var(--violet-light);
        border-color: var(--violet-light);
      }
    </style>
  </head>
  <body>
    <div class="grid-bg" id="gridBg"></div>
    <div class="halo"></div>

    <main>
      <!-- FIX moyen : role + aria-label + <title> pour l'accessibilité -->
      <div class="logo">
        <svg
          width="340"
          height="60"
          viewBox="0 0 340 60"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-label="Logo pxlc"
        >
          <title>Logo pxlc — Protection XL Caraïbes</title>
          <!-- Grille 3×3 — Variante C Triangle/Blason
           Ligne 1 : bleu (blue team / protection)
           Ligne 2 : transition bleu→violet→rouge
           Ligne 3 : violet + rouge (red team)
           Pixel 16px, gap 4px → bloc 56px, offset x=0 -->
          <!-- Ligne 1 -->
          <rect x="0" y="0" width="16" height="16" rx="3" fill="#1E88E5" />
          <rect x="20" y="0" width="16" height="16" rx="3" fill="#1565C0" />
          <rect x="40" y="0" width="16" height="16" rx="3" fill="#1976D2" />
          <!-- Ligne 2 -->
          <rect x="0" y="20" width="16" height="16" rx="3" fill="#5C6BC0" />
          <rect x="20" y="20" width="16" height="16" rx="3" fill="#7B1FA2" />
          <rect x="40" y="20" width="16" height="16" rx="3" fill="#E53935" />
          <!-- Ligne 3 -->
          <rect x="0" y="40" width="16" height="16" rx="3" fill="#6A1B9A" />
          <rect x="20" y="40" width="16" height="16" rx="3" fill="#AD1457" />
          <rect x="40" y="40" width="16" height="16" rx="3" fill="#C62828" />
          <!-- Texte -->
          <text
            x="74"
            y="40"
            font-family="'Space Mono', monospace"
            font-size="38"
            font-weight="700"
            fill="#EEEDFE"
          >
            pxlc
          </text>
        </svg>
      </div>

      <!-- FIX moyen : <h1> pour la sémantique SEO (était un <p>) -->
      <h1 class="headline">
        Le numérique, on vous l'explique.<span
          class="cursor"
          aria-hidden="true"
        ></span>
      </h1>

      <!-- FIX faible : role progressbar pour les lecteurs d'écran -->
      <div
        class="progress-wrap"
        role="progressbar"
        aria-valuenow="73"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-label="Avancement de la construction : 73%"
      >
        <div class="progress-label">
          <span>CONSTRUCTION EN COURS</span>
          <span>73%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <div class="contact">
        En attendant, contactez-nous :<br />
        <a id="mailLink" href="#">…</a>
        &nbsp;·&nbsp;
        <!-- FIX critique : numéro WhatsApp masqué comme l'email -->
        <a id="waLink" href="#">0690 71 76 18</a>
        &nbsp;·&nbsp;
        <a
          href="https://www.linkedin.com/in/azebus"
          rel="noopener noreferrer"
          target="_blank"
          >LinkedIn</a
        >
      </div>
    </main>

    <!-- FIX critique : mention légale visible (LCEN) — créer mentions-legales.html -->
    <a href="mentions-legales.html" class="legal-link">Mentions légales</a>

    <div class="corner">codé par Andy Zébus &mdash; Guadeloupe</div>

    <script>
      // ── Grille de pixels ──────────────────────────────────────────────────
      const colors = [
        "#1565C0",
        "#1E88E5",
        "#1976D2",
        "#90CAF9",
        "#4A148C",
        "#7B1FA2",
        "#5C6BC0",
        "#CE93D8",
        "#B71C1C",
        "#E53935",
        "#C62828",
        "#AD1457",
        "#6A1B9A",
        "#0e0c1e",
        "#16132e",
      ];
      const grid = document.getElementById("gridBg");
      for (let i = 0; i < 18 * 10; i++) {
        const s = document.createElement("span");
        s.style.background = colors[Math.floor(Math.random() * colors.length)];
        s.style.setProperty("--d", (3 + Math.random() * 5).toFixed(1) + "s");
        s.style.setProperty("--delay", (Math.random() * 4).toFixed(1) + "s");
        grid.appendChild(s);
      }

      // ── Contacts anti-bot : assemblés en JS, jamais en clair dans le HTML ─
      (function () {
        // Email
        const eUser = "contact";
        const eDomain = "pxlc" + "." + "fr";
        const email = eUser + "@" + eDomain;
        const mailEl = document.getElementById("mailLink");
        mailEl.textContent = email;
        mailEl.href = "mailto:" + email;

        // WhatsApp — FIX critique : numéro masqué, même technique que l'email
        const waNumber = "590" + "690" + "717" + "618";
        const waEl = document.getElementById("waLink");
        waEl.href = "https://wa.me/" + waNumber;
      })();
    </script>
  </body>
</html>
