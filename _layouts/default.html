<!doctype html>
<html lang="{{ site.lang | default: 'fr' }}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ page.title | default: site.title }}</title>

  {% if page.robots %}
  <meta name="robots" content="{{ page.robots }}" />
  {% else %}
  <meta name="robots" content="index, follow" />
  {% endif %}

  {% if page.description %}
  <meta name="description" content="{{ page.description }}" />
  {% elsif site.description %}
  <meta name="description" content="{{ site.description }}" />
  {% endif %}

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description"
    content="{{ page.og_description | default: page.description | default: site.description }}" />
  <meta property="og:image" content="https://pxlc.fr/PXLC_opengraph_1200x630.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://pxlc.fr/PXLC_opengraph_1200x630.png" />

  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <!-- Thème / icônes -->
  <meta name="theme-color" content="#EBF5F8" />
  <link rel="icon" type="image/svg+xml" href="{{ '/PXLC_favicon_adaptive.svg' | relative_url }}" />
  <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/PXLC_apple-touch-icon.png' | relative_url }}" />
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}" />

  <!-- CSP -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self';
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src https://fonts.gstatic.com;
               img-src 'self' data:;
               script-src 'self' 'unsafe-inline'" />

  <!-- ============================================================
         POLICES — chargement non-bloquant
         1. preconnect : ouvre la connexion DNS/TLS en avance
         2. media="print" onload : charge en arrière-plan, appliqué ensuite
         3. <noscript> : fallback si JS désactivé
         ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Manrope + Inter : texte courant — chargé en non-bloquant -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" />
  </noscript>

  <!-- Material Symbols — chargé en non-bloquant (séparé pour isoler le poids) -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..700,0..1&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..700,0..1&display=swap" />
  </noscript>

  <!-- CSS global — chargé en dernier mais non-bloquant pour les polices ci-dessus -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  <!-- CSS spécifique à la page (optionnel) -->
  {% if page.extra_css %}
  <link rel="stylesheet" href="{{ page.extra_css | relative_url }}" />
  {% endif %}

  <!-- JSON-LD structuré (pages qui le définissent) -->
  {% if page.jsonld %}
  <script type="application/ld+json">
      {{ page.jsonld }}
    </script>
  {% endif %}
</head>

<body class="{{ page.body_class | default: 'site-page' }}">
  {{ content }}

  <!-- JS global — en bas de body = non-bloquant par nature -->
  <script src="{{ '/assets/js/contacts.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>

  <!-- JS spécifique à la page (optionnel) -->
  {% if page.extra_js %}
  <script src="{{ page.extra_js | relative_url }}"></script>
  {% endif %}
</body>

</html>
